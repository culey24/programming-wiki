services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: programming_wiki
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://postgres:password@db:5432/programming_wiki
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      AGENT_SERVICE_URL: http://agent-service:8000
      FRONTEND_URL: http://localhost:5173
    volumes:
      - ./content:/app/content:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_started
      agent-service:
        condition: service_started

  agent-service:
    build:
      context: ./agent-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      CONTENT_DIR: /content
      CHROMA_PATH: /chroma_db
    volumes:
      - ./content:/content:ro
      - chroma_data:/chroma_db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      # Vite dev server proxy target (inside Docker network)
      VITE_DEV_BACKEND: http://backend:3001
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
  chroma_data:
