services:
  # Debian-based image avoids Alpine "locale: not found" / no usable locales warnings
  db:
    image: postgres:16-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: programming_wiki
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://postgres:password@db:5432/programming_wiki
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      AGENT_SERVICE_URL: http://agent-service:8000
      FRONTEND_URL: http://localhost:5173
      # Playground bind-mount: host path for `docker run -v` (Docker Desktop requirement)
      EXEC_SANDBOX_HOST_PATH: ${EXEC_SANDBOX_HOST_PATH:-${PWD}/.run-sandbox}
      EXEC_SANDBOX_CONTAINER_PATH: /run-sandbox
    volumes:
      - ./content:/app/content:ro
      - ./.run-sandbox:/run-sandbox:rw
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_started
      agent-service:
        condition: service_started

  agent-service:
    build:
      context: ./agent-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-google/gemini-2.5-flash}
      CONTENT_DIR: /content
      CHROMA_PATH: /chroma_db
    volumes:
      - ./content:/content:ro
      - chroma_data:/chroma_db

  docs-site:
    build:
      context: .
      dockerfile: docs-site/Dockerfile
      args:
        MAIN_APP_URL: http://localhost:5173
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      MAIN_APP_URL: http://localhost:5173

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_DEV_BACKEND: http://backend:3001
      VITE_DOCS_URL: http://localhost:3000
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
  chroma_data:
